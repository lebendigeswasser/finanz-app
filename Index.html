<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanz App</title>

manifest.json

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#f5f0e6,#e8f0e6,#e5edf5);
}

.container {
  padding:20px;
}

.header {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
  margin-bottom:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.input card {
  margin-bottom:15px;
}

textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
}

button {
  background:#6b8e23;
  color:white;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

.value {
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 Finanz App</h2>

<div class="header">
  <div class="card">Einnahmen<div id="income" class="value"></div></div>
  <div class="card">Fixkosten<div id="fixed" class="value"></div></div>
  <div class="card">Ausgaben<div id="expenses" class="value"></div></div>
</div>

<div class="card">
<textarea id="input" placeholder="z.B. Ich habe 20€ für Netflix bezahlt oder Recebi salário 3000"></textarea>
<button onclick="add()">🤖 Analysieren</button>
</div>

<div class="card">
<pre id="output"></pre>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem('data')) || {
  income:[],
  fixed:[],
  expenses:[]
};

function parse(text){
  text=text.toLowerCase();

  let amount = (text.match(/\\d+/) || [0])[0];
  amount = Number(amount);

  let type="expenses";

  if(text.includes("salary") || text.includes("gehalt") || text.includes("salário") || text.includes("recebi")) type="income";
  if(text.includes("rent") || text.includes("miete") || text.includes("aluguel")) type="fixed";

  return {amount,type};
}

function add(){
  let text = document.getElementById("input").value;
  let res = parse(text);

  data[res.type].push({text, val:res.amount});

  save();
  render();
}

function render(){

  let inc = data.income.reduce((a,i)=>a+i.val,0);
  let fix = data.fixed.reduce((a,i)=>a+i.val,0);
  let exp = data.expenses.reduce((a,i)=>a+i.val,0);

  document.getElementById("income").innerText = inc;
  document.getElementById("fixed").innerText = fix;
  document.getElementById("expenses").innerText = exp;

  document.getElementById("output").innerText = JSON.stringify(data,null,2);
}

function save(){
  localStorage.setItem("data", JSON.stringify(data));
}

render();

if ("serviceWorker" in navigator) {
 navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
