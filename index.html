<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanz App</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg,#f5f0e6,#e8f0e6,#e5edf5);
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h2 {
  text-align:center;
}

.dashboard {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.card {
  flex:1;
  min-width:140px;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

.value {
  font-size:26px;
  font-weight:bold;
  margin-top:10px;
}

.input-box {
  background:white;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

textarea {
  width:100%;
  height:90px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

button {
  margin-top:10px;
  width:100%;
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#6b8e23;
  color:white;
}

.output {
  background:white;
  padding:15px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 Finanz App (Live)</h2>

<div class="dashboard">
  <div class="card">
    Einnahmen
    <div id="income" class="value"></div>
  </div>

  <div class="card">
    Fixkosten
    <div id="fixed" class="value"></div>
  </div>

  <div class="card">
    Ausgaben
    <div id="expenses" class="value"></div>
  </div>
</div>

<div class="input-box">
<textarea id="input" placeholder="z.B. Gehalt 3000 oder Netflix 15€"></textarea>
<button onclick="add()">🤖 Analysieren</button>
</div>

<div class="output">
<pre id="output"></pre>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem('data')) || {
 income:[],
 fixed:[],
 expenses:[]
};

function parse(text){
 text = text.toLowerCase();

 let amount = (text.match(/\d+/) || [0])[0];
 amount = Number(amount);

 let type="expenses";

 if(text.includes("gehalt") || text.includes("salary") || text.includes("salário") || text.includes("recebi"))
   type="income";

 if(text.includes("miete") || text.includes("rent") || text.includes("aluguel"))
   type="fixed";

 return {amount,type};
}

function add(){
 let text = document.getElementById("input").value;

 if(!text) return;

 let res = parse(text);

 data[res.type].push({text, val:res.amount});

 save();
 render();

 document.getElementById("input").value = "";
}

function render(){

 let inc = data.income.reduce((a,i)=>a+i.val,0);
 let fix = data.fixed.reduce((a,i)=>a+i.val,0);
 let exp = data.expenses.reduce((a,i)=>a+i.val,0);

 document.getElementById("income").innerText = inc;
 document.getElementById("fixed").innerText = fix;
 document.getElementById("expenses").innerText = exp;

 document.getElementById("output").innerText =
   JSON.stringify(data,null,2);
}

function save(){
 localStorage.setItem("data", JSON.stringify(data));
}

render();

</script>

</body>
</html>
