<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanz App</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg,#f5f0e6,#e8f0e6,#e5edf5);
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h2 {
  text-align:center;
}

.dashboard {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.card {
  flex:1;
  min-width:150px;
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
}

button {
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#6b8e23;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 Finanz App</h2>

<div class="dashboard">
  <div class="card">Einnahmen <div id="income"></div></div>
  <div class="card">Fixkosten <div id="fixed"></div></div>
  <div class="card">Ausgaben <div id="expenses"></div></div>
</div>

<textarea id="input" placeholder="z.B. Gehalt 3000"></textarea>
<button onclick="add()">Speichern</button>

<pre id="output"></pre>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {
 income:[], fixed:[], expenses:[]
};

function add(){
 let text = document.getElementById("input").value;
 let val = (text.match(/\\d+/)||[0])[0];

 data.expenses.push({text, val:Number(val)});

 localStorage.setItem("data",JSON.stringify(data));

 render();
}

function render(){
 document.getElementById("output").innerText = JSON.stringify(data,null,2);
}

render();
</script>

</body>
</html>
