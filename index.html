<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanz App</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#f5f0e6,#e8f0e6,#e5edf5);
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.dashboard {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.card {
  flex:1;
  min-width:120px;
  background:white;
  padding:15px;
  border-radius:15px;
}

textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#6b8e23;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 Finanz App</h2>

<div class="dashboard">
  <div class="card">Einnahmen<div id="income"></div></div>
  <div class="card">Fixkosten<div id="fixed"></div></div>
  <div class="card">Ausgaben<div id="expenses"></div></div>
</div>

<textarea id="input"></textarea>
<button onclick="add()">Speichern</button>

<pre id="output"></pre>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {
 income:[],
 fixed:[],
 expenses:[]
};

function parse(t){
 t=t.toLowerCase();
 let val=(t.match(/\d+/)||[0])[0];

 let type="expenses";
 if(t.includes("salary")||t.includes("gehalt")) type="income";
 if(t.includes("rent")||t.includes("miete")) type="fixed";

 return {val:Number(val),type};
}

function add(){
 let t=document.getElementById("input").value;
 let r=parse(t);

 data[r.type].push({val:r.val});

 localStorage.setItem("data",JSON.stringify(data));
 render();
}

function render(){
 document.getElementById("income").innerText =
   data.income.reduce((a,i)=>a+i.val,0);

 document.getElementById("fixed").innerText =
   data.fixed.reduce((a,i)=>a+i.val,0);

 document.getElementById("expenses").innerText =
   data.expenses.reduce((a,i)=>a+i.val,0);

 document.getElementById("output").innerText =
   JSON.stringify(data,null,2);
}

render();
</script>

</body>
</html>
